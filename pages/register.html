<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8" /><meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

  <title>Register - Quavron</title>  <link
    rel="stylesheet"
    href="/css/style.css"
  /></head><body>  <div class="auth-container"><div class="auth-box">

  <h1>
    Create Account
  </h1>

  <form>

    <input
      type="text"
      placeholder="Username"
      required
    />

    <input
      type="email"
      placeholder="Email"
      required
    />

    <input
      type="password"
      placeholder="Password"
      required
    />

    <input
      type="password"
      placeholder="Confirm Password"
      required
    />

    <button type="submit">
      Register
    </button>

  </form>

  <p>
    Already have an account?
    <a href="/pages/login.html">
      Login
    </a>
  </p>

</div>

  </div></body></html>
