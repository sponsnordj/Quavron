<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8" /><meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

  <title>Editor - Quavron</title>  <link
    rel="stylesheet"
    href="/css/style.css"
  />  <script
    defer
    src="/js/editor.js"
  ></script></head><body>  <div class="editor-layout"><!-- Sidebar -->

<aside class="editor-sidebar">

  <div class="editor-logo">
    Quavron IDE
  </div>

  <div class="file-explorer">

    <div class="file-item">
      index.html
    </div>

    <div class="file-item">
      style.css
    </div>

    <div class="file-item">
      main.js
    </div>

  </div>

</aside>

<!-- Main Editor -->

<main class="editor-main">

  <div class="editor-topbar">

    <button>
      Run
    </button>

    <button>
      Save
    </button>

    <button>
      Deploy
    </button>

  </div>

  <div
    id="editor"
    class="editor-container"
  >

    <!-- Monaco Editor Will Be Here -->

  </div>

</main>

  </div></body></html>
